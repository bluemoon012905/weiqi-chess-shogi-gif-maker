<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Board Game GIF Maker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bitter:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="page-shell">
      <header class="hero">
        <p class="eyebrow">Static Creator Tool</p>
        <h1>Board Game GIF Maker</h1>
        <p class="hero-copy">
          Choose a game, import notation, review the move tree or range, and export a GIF.
          Xiangqi, Chess, Weiqi / Go, and Shogi now share one creator-focused workflow.
        </p>
      </header>

      <section class="card mode-selector-card">
        <div class="mode-selector-header">
          <div>
            <p class="eyebrow">Game Mode</p>
            <h2 id="mode-title">Xiangqi</h2>
            <p id="mode-copy" class="helper-copy">
              Board editor, playback, and FEN/UCCI GIF export.
            </p>
          </div>
        </div>
        <div id="mode-nav" class="mode-nav" aria-label="Game mode tabs"></div>
      </section>

      <main id="mode-host"></main>
    </div>

    <script src="./vendor-gif.js"></script>
    <script type="module" src="./app.js"></script>
  </body>
</html>
